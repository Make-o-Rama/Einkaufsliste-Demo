<h1 class="font-['Plus_Jakarta_Sans'] font-semibold tracking-tight text-[#2b3530] text-lg">Greenhouse List</h1>
</div>
<button class="material-symbols-outlined text-[#286a56] hover:bg-[#e8f0ea] p-2 rounded-full transition-colors active:scale-95 duration-200">

        </button>
</header>
<!-- Main Content: Add New Item Screen -->
<main class="flex-1 mt-16 mb-24 px-6 pt-8 max-w-2xl mx-auto w-full">
<!-- Header Section -->
<header class="mb-10">
<div class="flex items-center justify-between mb-2">
<span class="text-primary font-headline font-bold tracking-widest text-[10px] uppercase">New Entry</span>
<span class="bg-tertiary-container text-on-tertiary-container px-3 py-1 rounded-full font-label text-[10px] font-semibold tracking-wider">MARCH 24</span>
</div>
<h2 class="font-headline text-3xl font-extrabold text-on-surface leading-tight">What are we <br/><span class="text-primary">stocking today?</span></h2>
</header>
<!-- Form Canvas -->
<div class="space-y-8">
<!-- Item Name Input -->
<section class="space-y-3">
<label class="block font-headline text-sm font-bold text-on-surface-variant ml-1">Item Name</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-xl px-5 py-4 text-xl font-headline font-semibold text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary/20 transition-all" placeholder="e.g. Organic Kale" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex gap-2">
<span class="material-symbols-outlined text-outline-variant">edit_note</span>
</div>
</div>
</section>
<!-- Category Selection Chips -->
<section class="space-y-4">
<div class="flex items-center justify-between px-1">
<label class="block font-headline text-sm font-bold text-on-surface-variant">Category</label>
<button class="text-primary text-xs font-bold uppercase tracking-wider">Manage</button>
</div>
<div class="flex flex-wrap gap-3">
<button class="flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-full font-label text-sm font-medium transition-all active:scale-95">
<span class="material-symbols-outlined text-[18px]">eco</span>
                        Produce
                    </button>
<button class="flex items-center gap-2 px-4 py-2 bg-surface-container text-on-surface-variant rounded-full font-label text-sm font-medium hover:bg-surface-container-high transition-all active:scale-95">
<span class="material-symbols-outlined text-[18px]">egg</span>
                        Dairy
                    </button>
<button class="flex items-center gap-2 px-4 py-2 bg-surface-container text-on-surface-variant rounded-full font-label text-sm font-medium hover:bg-surface-container-high transition-all active:scale-95">
<span class="material-symbols-outlined text-[18px]">bakery_dining</span>
                        Bakery
                    </button>
<button class="flex items-center gap-2 px-4 py-2 bg-surface-container text-on-surface-variant rounded-full font-label text-sm font-medium hover:bg-surface-container-high transition-all active:scale-95">
<span class="material-symbols-outlined text-[18px]">inventory_2</span>
                        Pantry
                    </button>
<button class="flex items-center gap-2 px-4 py-2 bg-surface-container text-on-surface-variant rounded-full font-label text-sm font-medium hover:bg-surface-container-high transition-all active:scale-95">
<span class="material-symbols-outlined text-[18px]">flatware</span>
                        Frozen
                    </button>
</div>
</section>

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<section class="bg-surface-container-low p-5 rounded-xl space-y-3">
<label class="block font-headline text-xs font-bold text-on-surface-variant uppercase tracking-widest">Target Date</label>
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-white flex items-center justify-center text-primary shadow-sm">
<span class="material-symbols-outlined">calendar_today</span>
</div>
<div>
<p class="font-headline font-bold text-on-surface">Tomorrow</p>
<p class="font-label text-xs text-on-surface-variant">March 25, 2024</p>
</div>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</div>
</section>
<!-- Quantity Stepper -->
<section class="bg-surface-container-low p-5 rounded-xl space-y-3">
<label class="block font-headline text-xs font-bold text-on-surface-variant uppercase tracking-widest">Quantity</label>
<div class="flex items-center justify-between">
<button class="w-10 h-10 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center hover:opacity-80 transition-all active:scale-90">

<span class="font-headline font-bold text-xl">2</span>
<button class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center hover:opacity-90 transition-all active:scale-90">
<span class="material-symbols-outlined">add</span>

<p class="text-white font-headline font-medium text-sm italic">"Let food be thy medicine..."</p>
</div>
</section>

<button class="w-full bg-primary text-on-primary py-5 rounded-[1.5rem] font-headline font-bold text-lg shadow-[0_12px_32px_rgba(40,106,86,0.2)] hover:shadow-[0_12px_32px_rgba(40,106,86,0.3)] transition-all active:scale-95 flex items-center justify-center gap-3">

</button>
<button class="w-full bg-transparent text-on-surface-variant py-3 font-label font-bold text-xs uppercase tracking-[0.2em] transition-opacity hover:opacity-70">

</div>
