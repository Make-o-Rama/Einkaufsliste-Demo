<!DOCTYPE html>
<html class="light" lang="de">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Greenhouse List - Neuer Artikel hinzufügen</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "error-container": "#fa746f",
            "surface": "#f6faf6",
            "tertiary-fixed-dim": "#a9e0ed",
            "on-secondary": "#e4fff3",
            "inverse-on-surface": "#999e9b",
            "on-surface": "#2b3530",
            "surface-container-lowest": "#ffffff",
            "secondary-fixed-dim": "#c0dace",
            "on-background": "#2b3530",
            "on-error": "#fff7f6",
            "on-primary": "#e4fff3",
            "tertiary-dim": "#205a65",
            "error-dim": "#67040d",
            "background": "#f6faf6",
            "on-secondary-container": "#3f574e",
            "surface-container-low": "#eff5f0",
            "on-tertiary": "#edfbff",
            "outline-variant": "#aab4af",
            "on-primary-fixed": "#004938",
            "on-secondary-fixed-variant": "#496057",
            "on-tertiary-fixed-variant": "#2d6570",
            "primary-fixed-dim": "#a0e2c9",
            "on-error-container": "#6e0a12",
            "surface-tint": "#286a56",
            "secondary-container": "#cee9dc",
            "surface-bright": "#f6faf6",
            "tertiary": "#2f6772",
            "inverse-primary": "#bbffe5",
            "surface-container-highest": "#dae5df",
            "surface-dim": "#d2ddd6",
            "tertiary-container": "#b7effb",
            "on-tertiary-container": "#215b66",
            "on-secondary-fixed": "#2d443b",
            "primary-container": "#adf0d7",
            "primary-dim": "#195e4b",
            "on-primary-container": "#175c49",
            "on-tertiary-fixed": "#034853",
            "surface-container": "#e8f0ea",
            "surface-container-high": "#e1eae5",
            "on-surface-variant": "#57615c",
            "secondary-dim": "#40584f",
            "error": "#a83836",
            "primary": "#286a56",
            "outline": "#727d78",
            "secondary-fixed": "#cee9dc",
            "on-primary-fixed-variant": "#246653",
            "tertiary-fixed": "#b7effb",
            "primary-fixed": "#adf0d7",
            "secondary": "#4c645b",
            "inverse-surface": "#0a0f0d",
            "surface-variant": "#dae5df"
          },
          fontFamily: {
            "headline": ["Plus Jakarta Sans"],
            "body": ["Work Sans"],
            "label": ["Work Sans"]
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">

  <!-- TopAppBar -->
  <header class="top-app-bar">
    <div class="flex items-center gap-4">
      <button class="icon-btn material-symbols-outlined">menu</button>
      <h1 class="font-headline font-semibold tracking-tight text-on-surface text-lg">Greenhouse List</h1>
    </div>
    <button class="icon-btn material-symbols-outlined">search</button>
  </header>

  <main class="flex-1 mt-16 mb-24 px-6 pt-8 max-w-2xl mx-auto w-full">

    <!-- Header -->
    <header class="mb-10">
      <div class="flex items-center justify-between mb-2">
        <span class="text-primary font-headline font-bold tracking-widest text-[10px] uppercase">New Entry</span>
        <span class="date-badge">MARCH 24</span>
      </div>
      <h2 class="font-headline text-3xl font-extrabold text-on-surface leading-tight">
        What are we <br /><span class="text-primary">stocking today?</span>
      </h2>
    </header>

    <!-- Formular -->
    <div class="space-y-8">

      <!-- Artikelname -->
      <section class="space-y-3">
        <label class="block font-headline text-sm font-bold text-on-surface-variant ml-1">Item Name</label>
        <div class="relative">
          <input class="form-input" placeholder="e.g. Organic Kale" type="text" />
          <div class="absolute right-4 top-1/2 -translate-y-1/2">
            <span class="material-symbols-outlined text-outline-variant">edit_note</span>
          </div>
        </div>
      </section>

      <!-- Kategorie-Chips -->
      <section class="space-y-4">
        <div class="flex items-center justify-between px-1">
          <label class="block font-headline text-sm font-bold text-on-surface-variant">Category</label>
          <button class="text-primary text-xs font-bold uppercase tracking-wider bg-transparent border-none cursor-pointer">Manage</button>
        </div>
        <div class="flex flex-wrap gap-3">
          <button class="chip chip--active">
            <span class="material-symbols-outlined text-[18px]">eco</span>
            Produce
          </button>
          <button class="chip">
            <span class="material-symbols-outlined text-[18px]">egg</span>
            Dairy
          </button>
          <button class="chip">
            <span class="material-symbols-outlined text-[18px]">bakery_dining</span>
            Bakery
          </button>
          <button class="chip">
            <span class="material-symbols-outlined text-[18px]">inventory_2</span>
            Pantry
          </button>
          <button class="chip">
            <span class="material-symbols-outlined text-[18px]">flatware</span>
            Frozen
          </button>
        </div>
      </section>

      <!-- Datum & Menge -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Datum -->
        <section class="form-section">
          <label class="form-label">Target Date</label>
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="date-icon">
                <span class="material-symbols-outlined">calendar_today</span>
              </div>
              <div>
                <p class="font-headline font-bold text-on-surface">Tomorrow</p>
                <p class="font-label text-xs text-on-surface-variant">March 25, 2024</p>
              </div>
            </div>
            <span class="material-symbols-outlined text-outline-variant">chevron_right</span>
          </div>
        </section>

        <!-- Menge -->
        <section class="form-section">
          <label class="form-label">Quantity</label>
          <div class="flex items-center justify-between">
            <button class="stepper-btn stepper-btn--secondary">
              <span class="material-symbols-outlined">remove</span>
            </button>
            <span class="font-headline font-bold text-xl">2</span>
            <button class="stepper-btn stepper-btn--primary">
              <span class="material-symbols-outlined">add</span>
            </button>
          </div>
        </section>
      </div>

      <!-- Visuelles Bild -->
      <section class="image-card">
        <img alt="Fresh produce section" class="image-card-img" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6GTbgKnRbJ4d2uUTgXguvZpfyXsUZpzcADvRzsjkZfXkVr-4tvKnVXNj2uGrSlL9DcHhdz-Lt4XaNCs4nfGKMCyVttyfPTsyTf8bwfQh46E9HsIhtxlCbL3ELoF7cJgBuLFZs8xPRaQPwgvP7xTYEdCOCqVqhkKveLTmuxrLVTZv7SGThvUeUQZEKKu7C1Yo6kRqqJPxkw64CR3jk13xxXapKNqZjZ1WIyMGTLvZ75Hm0-09BYNvPyr1ugmgUKT5cTNqpNlzx7Oqq" />
        <div class="image-card-overlay">
          <p class="text-white font-headline font-medium text-sm italic">"Let food be thy medicine..."</p>
        </div>
      </section>

      <!-- Aktionsbereich -->
      <div class="pt-4 flex flex-col gap-4">
        <button class="cta-btn">
          Add to Greenhouse
          <span class="material-symbols-outlined">eco</span>
        </button>
        <button class="cancel-btn">
          Cancel Entry
        </button>
      </div>

    </div>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-item nav-item--active">
      <span class="material-symbols-outlined">format_list_bulleted</span>
      <span class="nav-label">Lists</span>
    </button>
    <button class="nav-item">
      <span class="material-symbols-outlined">kitchen</span>
      <span class="nav-label">Pantry</span>
    </button>
    <button class="nav-item">
      <span class="material-symbols-outlined">receipt_long</span>
      <span class="nav-label">Recipes</span>
    </button>
    <button class="nav-item">
      <span class="material-symbols-outlined">settings</span>
      <span class="nav-label">Settings</span>
    </button>
  </nav>

  <!-- Dekorative Hintergrund-Elemente -->
  <div class="deco-circle deco-circle--right"></div>
  <div class="deco-circle deco-circle--left"></div>

</body>
</html>
